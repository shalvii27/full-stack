<html>
<head>
    <title> table </title>
</head>
<body>
    <table border="1px" cellpadding="10px" cellspacing="10px">
        <tr>
            <th>column 1</th>
            <th colspan="2">column 2</th>
        </tr>
        <tr>
            <td>column 1.1</td>
            <td>column 2.1</td>
            <td rowspan="2">column 3.1</td>
            <td rowspan="2"></td>column 3</td>

        </tr>
        <tr>
            <td>column 1.2</td>
            <td>column 2.2</td>
        </tr>
    </table>
    
</body>
</html>
