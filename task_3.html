<!DOCTYPE html>
<html lang="en">
<head>
    <title>Application Form</title>
</head>
<body>

<h2>Application Form</h2>

<form>

    First Name:
    <input type="text"><br>
    Last Name:
    <input type="text">
    <br><br>

    Date of Birth:
    <input type="date" name="dob"><br>

    Age:
    <input type="number" name="age">
    <br><br>

    Gender:
    <select name="gender">
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
    </select>

    Email Address:
    <input type="email" name="email" placeholder="Enter email address">
    <br><br>

    Positions Available:
    <input type="radio" name="position"> Junior Developer
    <input type="radio" name="position"> Mid-level Developer
    <input type="radio" name="position"> Senior Developer
    <br><br>

    Programming Languages:
    <input type="checkbox" name="java"> Java
    <input type="checkbox" name="js"> JavaScript
    <input type="checkbox" name="python"> Python
    <br><br>

    Password:
    <input type="password" name="password">
    <br>
    Confirm Password:
    <input type="password" name="confirm_password">
    <br><br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</body>
</html>
